<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RavenDOS - Engineering Intelligent Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-primary text-background antialiased overflow-x-hidden selection:bg-accent selection:text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- SVG Noise Texture -->
    <svg class="pointer-events-none fixed inset-0 z-50 h-full w-full opacity-[0.05]">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)"></rect>
    </svg>
  </body>
</html>
